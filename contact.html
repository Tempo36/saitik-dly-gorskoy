<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Mountain Escape</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <!-- так же -->
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">Mountain<span>Escape</span></a>
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="rooms.html">Номера</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="contact.html" class="active">Контакты</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Контакты</h1>
            <div class="breadcrumbs">
                <a href="index.html">Главная</a> / <span>Контакты</span>
            </div>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2>Свяжитесь с нами</h2>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>Адрес</h4>
                            <p>Республика Алтай, с. Чемал, ул. Горная, 15</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h4>Телефон</h4>
                            <p>+7 (999) 123-45-67</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>Email</h4>
                            <p>info@mountain-escape.ru</p>
                        </div>
                    </div>
                </div>
                
                <div class="contact-form">
                    <h2>Напишите нам</h2>
                    <form id="contactForm">
                        <div class="form-group">
                            <input type="text" id="contactName" placeholder="Ваше имя" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="contactEmail" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <textarea id="contactMessage" rows="5" placeholder="Сообщение" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </form>
                </div>
            </div>
            
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d152822.41715440508!2d85.91572949714466!3d51.13476673549242!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x42a7e8473f6b9e3b%3A0xbc3549e16a8c0b9f!2z0KfQtdC80LDQuw!5e0!3m2!1sru!2sru!4v1634567890123!5m2!1sru!2sru" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <footer class="footer">
        <!-- такой же -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
